<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Smart IoT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #10B981; /* เขียวพรีเมียม */
            --dark-green: #047857;
            --accent-yellow: #F59E0B; /* เหลืองพรีเมียม */
            --click-orange: #EA580C; /* ส้มตอนกด */
            --bg-gradient: linear-gradient(135deg, #ecfdf5 0%, #fef3c7 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* Header Style (Glassmorphism) */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            max-width: 1200px;
            margin: 0 auto 40px auto;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Error Banner */
        .error-msg {
            text-align: center;
            color: #b91c1c;
            background: #fecaca;
            padding: 12px;
            border-radius: 10px;
            max-width: 1200px;
            margin: 0 auto 20px auto;
            font-weight: 500;
            display: none;
            box-shadow: 0 4px 6px rgba(220, 38, 38, 0.1);
            animation: fadeIn 0.5s ease-out;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card Style */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            border-top: 5px solid var(--accent-yellow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Hover Effect */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15);
            border-top-color: var(--primary-green);
        }

        /* Staggered Animation */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 15px;
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: #d1fae5;
            color: var(--primary-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .device-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            display: block;
        }

        .device-pin {
            font-size: 12px;
            color: var(--text-muted);
        }

        .device-type {
            font-size: 11px;
            background-color: #f3f4f6;
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .status-on, .status-active {
            background-color: #d1fae5;
            color: var(--dark-green);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        /* ไฟกระพริบสำหรับสถานะ ON */
        .status-on::before, .status-active::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-off {
            background-color: #f3f4f6;
            color: var(--text-muted);
        }
        
        .status-off::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
        }

        /* ปุ่ม Premium Toggle */
        .toggle-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FDE047 0%, var(--accent-yellow) 100%);
            color: #78350f;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
        }

        /* เอฟเฟกต์สีส้มตอนกด (Click Effect) */
        .toggle-btn:active {
            background: linear-gradient(135deg, var(--click-orange) 0%, #c2410c 100%);
            color: white;
            transform: scale(0.95);
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2), 0 0 15px rgba(234, 88, 12, 0.4);
        }

        .update-time {
            font-size: 11px;
            color: #9ca3af;
            text-align: right;
            margin-top: 10px;
        }

        /* Keyframes */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-house-signal"></i> Smart Home Center</h1>
        <p>แผงควบคุมอัจฉริยะแบบเรียลไทม์</p>
    </div>

    <div id="errorMessage" class="error-msg">
        <i class="fa-solid fa-triangle-exclamation"></i> ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ ระบบเปิดใช้งาน Offline Mode
    </div>

    <div class="dashboard-grid" id="dashboardGrid">
        </div>

    <script>
        const API_URL = 'http://tc.sbtc-mng.com/api.php';
        
        // ข้อมูลสำรอง (Failsafe) รับประกันว่าหน้าเว็บไม่พัง
        const fallbackData = {
            "success": true,
            "count": 5,
            "data": [
                {"id": "1", "device_name": "LED1", "device_type": "LED", "pin": "13", "status": "ON", "created_at": "2026-06-30 10:16:41"},
                {"id": "2", "device_name": "LED2", "device_type": "LED", "pin": "12", "status": "OFF", "created_at": "2026-06-30 10:16:41"},
                {"id": "3", "device_name": "Temperature", "device_type": "SENSOR", "pin": "34", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41"},
                {"id": "4", "device_name": "Humidity", "device_type": "SENSOR", "pin": "35", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41"},
                {"id": "5", "device_name": "Soil Moisture", "device_type": "SENSOR", "pin": "36", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41"}
            ]
        };

        // ฟังก์ชันเลือกไอคอนตามชื่ออุปกรณ์
        function getIcon(name, type) {
            name = name.toLowerCase();
            if (type === 'LED') return '<i class="fa-solid fa-lightbulb"></i>';
            if (name.includes('temp')) return '<i class="fa-solid fa-temperature-half"></i>';
            if (name.includes('humid')) return '<i class="fa-solid fa-droplet"></i>';
            if (name.includes('soil')) return '<i class="fa-solid fa-seedling"></i>';
            return '<i class="fa-solid fa-microchip"></i>';
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network error');
                const result = await response.json();
                
                if (result.success && result.data) {
                    renderDashboard(result.data);
                    document.getElementById('errorMessage').style.display = 'none';
                } else {
                    throw new Error('API Data Invalid');
                }
            } catch (error) {
                console.warn('ใช้ระบบ Failsafe:', error);
                document.getElementById('errorMessage').style.display = 'block';
                renderDashboard(fallbackData.data);
            }
        }

        function renderDashboard(devices) {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = ''; 

            devices.forEach((device) => {
                const isLED = device.device_type === 'LED';
                const isOn = device.status === 'ON' || device.status === 'ACTIVE';
                const statusClass = isOn ? 'status-on' : 'status-off';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="device-info">
                            <div class="icon-box ${isOn && isLED ? 'glow' : ''}" id="icon-${device.id}">
                                ${getIcon(device.device_name, device.device_type)}
                            </div>
                            <div>
                                <span class="device-name">${device.device_name}</span>
                                <span class="device-pin">PIN: ${device.pin}</span>
                            </div>
                        </div>
                        <span class="device-type">${device.device_type}</span>
                    </div>
                    <div class="card-body">
                        <div class="status-container">
                            <span style="font-weight: 500; color: #4b5563;">Status</span>
                            <span class="status-badge ${statusClass}" id="status-${device.id}">${device.status}</span>
                        </div>
                        ${isLED ? `<button class="toggle-btn" onclick="toggleDevice('${device.id}')">
                            <i class="fa-solid fa-power-off"></i> Toggle Power
                        </button>` : ''}
                        <div class="update-time">อัปเดตล่าสุด: ${device.created_at}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ฟังก์ชันกดปุ่ม (จำลองการกดแล้วเปลี่ยนสถานะ)
        function toggleDevice(id) {
            const statusBadge = document.getElementById(`status-${id}`);
            const iconBox = document.getElementById(`icon-${id}`);
            const currentStatus = statusBadge.innerText;
            
            if (currentStatus === 'ON') {
                statusBadge.innerText = 'OFF';
                statusBadge.className = 'status-badge status-off';
                iconBox.style.color = '#6b7280';
                iconBox.style.background = '#f3f4f6';
            } else {
                statusBadge.innerText = 'ON';
                statusBadge.className = 'status-badge status-on';
                iconBox.style.color = 'var(--primary-green)';
                iconBox.style.background = '#d1fae5';
            }
            
            // ตรงนี้สามารถเพิ่ม Code fetch() ไปยัง API เพื่อสั่งงานจริงได้
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = fetchData;
        
        // รีเฟรชข้อมูลอัตโนมัติทุกๆ 30 วินาที
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
